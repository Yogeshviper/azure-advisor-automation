name: Azure Advisor Automation

#on:

#  schedule:
#    - cron: '0 5 * * 1'

  workflow_dispatch:

jobs:

  advisor-report:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Fetch Advisor Recommendations
      run: |
        
        mkdir reports
        
        for sub in $(az account list --query "[].id" -o tsv)
        do
          
          echo "Processing Subscription: $sub"
          
          az account set --subscription $sub

          subname=$(az account show --query name -o tsv | tr ' ' '_')
          
          az advisor recommendation list \
          --output json \
          > reports/${subname}.json

        done

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Generate Excel Report
      run: |
        python generate_report.py

    - name: Send Email
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        CC_EMAIL: ${{ secrets.CC_EMAIL }}
      run: |
        python send_mail.py
